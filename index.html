<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds Birds Birds – MLH AI Roadshow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --slide-blue: #9BA9EF;
            --slide-gray: #F6F7FA;
            --slide-text: #3D3D3C;
            --slide-lime: #D2FA4D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bagel Fat One', cursive;
            overflow: hidden;
            background: var(--slide-blue);
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Made with love footer */
        #credits {
            position: fixed;
            bottom: 24px;
            left: 32%;
            z-index: 999;
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--slide-text);
            opacity: 0.7;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        /* HUD watermark styled as massive slide text */
        #hud {
            position: fixed;
            top: 40px;
            left: 50px;
            z-index: 0;
            color: var(--slide-text);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 60vw;
        }

        #hud .title {
            font-size: 6.5rem;
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: 1px;
        }

        #hud .subtitle {
            font-size: 2rem;
            font-weight: 400;
            opacity: 0.8;
            line-height: 1.3;
            border-top: 5px solid var(--slide-text);
            padding-top: 30px;
            margin-top: 10px;
        }

        /* Bird count badge styled like the neon accents */
        #bird-count {
            position: fixed;
            bottom: 30px;
            left: 28px;
            z-index: 999;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--slide-blue);
            background: var(--slide-lime);
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid var(--slide-text);
            box-shadow: 4px 4px 0px var(--slide-text);
        }

        /* Birds */
        .bird-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            will-change: transform;
        }

        .bird {
            max-width: 240px;
            max-height: 240px;
            display: block;
            animation: flap 0.4s ease-in-out infinite alternate;
            filter: contrast(1.1); /* Removed drop-shadows */
        }

        @keyframes flap {
            0% {
                transform: scaleY(1) scaleX(1) rotate(0deg);
            }

            100% {
                transform: scaleY(0.93) scaleX(1.05) rotate(1.2deg);
            }
        }

        /* Bird name labels */
        .bird-label {
            font-family: 'Bagel Fat One', cursive;
            font-size: 14px;
            font-weight: 400;
            color: var(--slide-text);
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--slide-text);
            border-radius: 20px;
            padding: 4px 12px;
            white-space: nowrap;
            letter-spacing: 0.02em;
            box-shadow: 2px 2px 0px var(--slide-lime);
        }

        #sky {
            position: absolute;
            inset: 0;
        }
    </style>
    <style id="dynamic-keyframes"></style>
</head>

<body>

    <div id="hud">
        <div class="title">Who's Flying to<br>All Things AI?</div>
    </div>

    <div id="bird-count">0 birds flying</div>

    <div id="credits">made with ♥ by the MLH AI Roadshow Team</div>

    <div id="sun"></div>
    <div id="sky"></div>

    <script>
        let seenBirds = new Set();
        const sky = document.getElementById('sky');
        const kfStyle = document.getElementById('dynamic-keyframes');
        const countLabel = document.getElementById('bird-count');

        function removeWhiteBackground(img) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < d.data.length; i += 4) {
                    if (d.data[i] > 235 && d.data[i + 1] > 235 && d.data[i + 2] > 235) {
                        d.data[i + 3] = 0;
                    }
                }
                ctx.putImageData(d, 0, 0);
                img.src = canvas.toDataURL('image/png');
            } catch (e) { console.warn('Image processing failed:', e); }
        }

        async function fetchManifest() {
            try {
                const res = await fetch('manifest.json?t=' + Date.now());
                if (!res.ok) return;
                const birds = await res.json();
                birds.forEach(bird => {
                    if (!seenBirds.has(bird.id)) {
                        seenBirds.add(bird.id);
                        addBirdToSky(bird);
                    }
                });
                countLabel.textContent = seenBirds.size + ' bird' + (seenBirds.size !== 1 ? 's' : '') + ' flying';
            } catch (e) { console.warn('Manifest fetch error:', e); }
        }

        function addBirdToSky(bird) {
            kfStyle.innerHTML += '\n' + bird.animation.css_keyframes;

            const wrapper = document.createElement('div');
            wrapper.className = 'bird-wrapper';
            wrapper.id = bird.id;
            wrapper.style.top = (Math.random() * 65 + 8) + 'vh';
            wrapper.style.zIndex = Math.floor(Math.random() * 50) + 51;

            const dur = bird.animation.duration || '18s';
            const timing = bird.animation.timing_function || 'ease-in-out';
            wrapper.style.animation = bird.animation.animation_name + ' ' + dur + ' ' + timing + ' infinite';

            const img = document.createElement('img');
            img.crossOrigin = 'anonymous';
            img.src = bird.image;
            img.className = 'bird';
            img.onload = function () { removeWhiteBackground(img); };
            wrapper.appendChild(img);

            if (bird.bird_name || bird.origin) {
                const label = document.createElement('div');
                label.className = 'bird-label';
                const n = bird.bird_name || 'Anon';
                const o = bird.origin || '';
                if (o) {
                    label.innerHTML = n + ' <span class="origin">· ' + o + '</span>';
                } else {
                    label.textContent = n;
                }
                wrapper.appendChild(label);
            }

            sky.appendChild(wrapper);
        }

        setInterval(fetchManifest, 6000);
        fetchManifest();
    </script>
</body>

</html>
