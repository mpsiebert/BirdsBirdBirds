<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds Birds Birds – MLH AI Roadshow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime:       #CCFF00;
            --periwinkle: #8888DD;
            --charcoal:   #2A2A35;
            --dark:       #222230;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: var(--charcoal);
            position: relative;
        }

        /* Subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* Subtle grid lines for texture depth */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.03;
            background-image:
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Header */
        #hud {
            position: fixed;
            top: 28px;
            left: 32px;
            z-index: 999;
        }
        #hud .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--lime);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        /* Bird counter */
        #bird-count {
            position: fixed;
            top: 34px;
            right: 36px;
            z-index: 999;
            font-size: 14px;
            font-weight: 700;
            color: var(--periwinkle);
            letter-spacing: 0.02em;
        }

        /* Credits */
        #credits {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            font-size: 11px;
            color: rgba(255,255,255,0.18);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        /* Birds */
        .bird-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            will-change: transform;
        }

        .bird {
            max-width: 160px;
            max-height: 160px;
            display: block;
            animation: flap 0.4s ease-in-out infinite alternate;
            /* Subtle glow to make birds pop against dark bg */
            filter: drop-shadow(0 0 12px rgba(204,255,0,0.15))
                    drop-shadow(0 0 30px rgba(136,136,221,0.1));
        }

        @keyframes flap {
            0%   { transform: scaleY(1) scaleX(1) rotate(0deg); }
            100% { transform: scaleY(0.93) scaleX(1.05) rotate(1.2deg); }
        }

        /* Bird name labels — neon lime + periwinkle gradient border */
        .bird-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--lime);
            background: rgba(30,30,50,0.8);
            backdrop-filter: blur(6px);
            border: 1.5px solid var(--periwinkle);
            border-radius: 20px;
            padding: 4px 14px;
            white-space: nowrap;
            letter-spacing: 0.03em;
        }
        .bird-label .origin {
            color: var(--periwinkle);
        }

        #sky { position: absolute; inset: 0; z-index: 50; }
    </style>
    <style id="dynamic-keyframes"></style>
</head>
<body>

    <div id="hud">
        <div class="title">MLH AI<br>Roadshow</div>
    </div>

    <div id="bird-count">0 birds flying</div>

    <div id="credits">made with ♥ by the MLH AI Roadshow Team</div>

    <div id="sky"></div>

    <script>
        let seenBirds = new Set();
        const sky        = document.getElementById('sky');
        const kfStyle    = document.getElementById('dynamic-keyframes');
        const countLabel = document.getElementById('bird-count');

        function removeWhiteBackground(img) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < d.data.length; i += 4) {
                    if (d.data[i] > 235 && d.data[i+1] > 235 && d.data[i+2] > 235) {
                        d.data[i+3] = 0;
                    }
                }
                ctx.putImageData(d, 0, 0);
                img.src = canvas.toDataURL('image/png');
            } catch(e) { console.warn('Image processing failed:', e); }
        }

        async function fetchManifest() {
            try {
                const res = await fetch('manifest.json?t=' + Date.now());
                if (!res.ok) return;
                const birds = await res.json();
                birds.forEach(bird => {
                    if (!seenBirds.has(bird.id)) {
                        seenBirds.add(bird.id);
                        addBirdToSky(bird);
                    }
                });
                countLabel.textContent = seenBirds.size + ' bird' + (seenBirds.size !== 1 ? 's' : '') + ' flying';
            } catch (e) { console.warn('Manifest fetch error:', e); }
        }

        function addBirdToSky(bird) {
            kfStyle.innerHTML += '\n' + bird.animation.css_keyframes;

            const wrapper = document.createElement('div');
            wrapper.className = 'bird-wrapper';
            wrapper.id        = bird.id;
            wrapper.style.top = (Math.random() * 65 + 8) + 'vh';
            wrapper.style.zIndex = Math.floor(Math.random() * 50) + 51;

            const dur    = bird.animation.duration  || '18s';
            const timing = bird.animation.timing_function || 'ease-in-out';
            wrapper.style.animation = bird.animation.animation_name + ' ' + dur + ' ' + timing + ' infinite';

            const img = document.createElement('img');
            img.crossOrigin = 'anonymous';
            img.src       = bird.image;
            img.className = 'bird';
            img.onload = function() { removeWhiteBackground(img); };
            wrapper.appendChild(img);

            if (bird.bird_name || bird.origin) {
                const label = document.createElement('div');
                label.className = 'bird-label';
                const n = bird.bird_name || 'Anon';
                const o = bird.origin || '';
                if (o) {
                    label.innerHTML = n + ' <span class="origin">· ' + o + '</span>';
                } else {
                    label.textContent = n;
                }
                wrapper.appendChild(label);
            }

            sky.appendChild(wrapper);
        }

        setInterval(fetchManifest, 6000);
        fetchManifest();
    </script>
</body>
</html>
