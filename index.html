<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds Birds Birds – Live Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-800: rgb(11, 29, 48);
            --navy-200: rgb(180, 190, 200);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            background: linear-gradient(180deg,
                #a8d8f0 0%,
                #c5e8f5 40%,
                #ddf1fd 70%,
                #eef8ff 100%);
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* subtle cloud-like circles */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.45);
            filter: blur(60px);
        }
        body::before { width: 500px; height: 300px; top: 10%; left: 5%; }
        body::after  { width: 400px; height: 200px; top: 20%; right: 10%; }

        /* Made with love footer */
        #credits {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--navy-800);
            opacity: 0.45;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        /* HUD watermark */
        #hud {
            position: fixed;
            top: 20px;
            left: 28px;
            z-index: 999;
            color: var(--navy-800);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #hud .title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
        #hud .subtitle { font-size: 0.7rem; opacity: 0.5; }

        /* Bird count badge */
        #bird-count {
            position: fixed;
            bottom: 20px;
            right: 28px;
            z-index: 999;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--navy-800);
            opacity: 0.55;
        }

        /* Birds */
        .bird {
            position: absolute;
            will-change: transform;
            max-width: 180px;
            max-height: 180px;
            filter: drop-shadow(3px 6px 8px rgba(0,0,0,0.18));
        }

        /* Entrance pop when a new bird is added */
        @keyframes bird-pop {
            0%   { opacity: 0; transform: scale(0.4); }
            60%  { transform: scale(1.15); }
            100% { opacity: 1; transform: scale(1); }
        }

        #sky { position: absolute; inset: 0; }
    </style>
    <style id="dynamic-keyframes"></style>
</head>
<body>

    <div id="credits">made with ♥ by the MLH AI Roadshow Team</div>

    <div id="hud">
        <div class="title">Who's flying to the MLH AI Roadshow?</div>
    </div>

    <div id="sky"></div>

    <div id="bird-count">0 birds in the sky</div>

    <script>
        let seenBirds = new Set();
        const sky        = document.getElementById('sky');
        const kfStyle    = document.getElementById('dynamic-keyframes');
        const countLabel = document.getElementById('bird-count');

        async function fetchManifest() {
            try {
                const res = await fetch('manifest.json?t=' + Date.now());
                if (!res.ok) return;
                const birds = await res.json();

                birds.forEach(bird => {
                    if (!seenBirds.has(bird.id)) {
                        seenBirds.add(bird.id);
                        addBirdToSky(bird);
                    }
                });

                countLabel.textContent = seenBirds.size + ' bird' + (seenBirds.size !== 1 ? 's' : '') + ' in the sky';
            } catch (e) {
                console.warn('Manifest fetch error:', e);
            }
        }

        function addBirdToSky(bird) {
            // inject keyframes
            kfStyle.innerHTML += '\n' + bird.animation.css_keyframes;

            const img = document.createElement('img');
            img.src       = bird.image + '?raw=true';
            img.className = 'bird';
            img.id        = bird.id;

            // random start vertical position between 5vh – 85vh
            const y = Math.random() * 80 + 5;
            img.style.top = y + 'vh';

            // random depth / overlap
            img.style.zIndex = Math.floor(Math.random() * 50) + 1;

            // apply the Gemini-generated animation
            const dur    = bird.animation.duration  || '18s';
            const timing = bird.animation.timing_function || 'ease-in-out';
            img.style.animation = bird.animation.animation_name + ' ' + dur + ' ' + timing + ' infinite';

            // entrance pop animation
            img.style.animationPlay  = 'running';
            sky.appendChild(img);
        }

        // Poll every 6 seconds
        setInterval(fetchManifest, 6000);
        fetchManifest();
    </script>
</body>
</html>
