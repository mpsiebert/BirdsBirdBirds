<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds Birds Birds – MLH AI Roadshow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #CCFF00;
            --periwinkle: #8888DD;
            --charcoal: #3D3D50;
            --dark: #333345;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            background: linear-gradient(180deg,
                    #a8d8f0 0%,
                    #c5e8f5 40%,
                    #ddf1fd 70%,
                    #eef8ff 100%);
            height: 100vh;
            width: 100vw;
            background: var(--charcoal);
            position: relative;
        }

        /* subtle cloud-like circles */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            filter: blur(60px);
        }

        body::before {
            width: 500px;
            height: 300px;
            top: 10%;
            left: 5%;
        }

        body::after {
            width: 400px;
            height: 200px;
            top: 20%;
            right: 10%;
        }

        /* Made with love footer */
        #credits {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--navy-800);
            opacity: 0.45;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        /* HUD watermark */
        #hud {
            position: fixed;
            top: 20px;
            left: 28px;
            z-index: 999;
            color: var(--navy-800);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #hud .title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #hud .subtitle {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        /* Bird count badge */
        #bird-count {
            position: fixed;
            bottom: 20px;
            right: 28px;
            z-index: 999;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--navy-800);
            opacity: 0.55;
        }

        /* Birds */
        .bird-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            will-change: transform;
        }

        .bird {
            max-width: 240px;
            max-height: 240px;
            display: block;
            animation: flap 0.4s ease-in-out infinite alternate;
            filter: contrast(1.3) brightness(1.15) drop-shadow(0 0 18px rgba(204, 255, 0, 0.25)) drop-shadow(0 0 40px rgba(136, 136, 221, 0.15));
        }

        @keyframes flap {
            0% {
                transform: scaleY(1) scaleX(1) rotate(0deg);
            }

            100% {
                transform: scaleY(0.93) scaleX(1.05) rotate(1.2deg);
            }
        }

        /* Bird name labels — neon lime + periwinkle gradient border */
        .bird-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--navy-800);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(11, 29, 48, 0.12);
            border-radius: 20px;
            padding: 3px 10px;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        #sky {
            position: absolute;
            inset: 0;
        }
    </style>
    <style id="dynamic-keyframes"></style>
</head>

<body>

    <div id="hud">
        <div class="title">Who's flying to the<br>MLH AI Roadshow?</div>
    </div>

    <div id="bird-count">0 birds flying</div>

    <div id="credits">made with ♥ by the MLH AI Roadshow Team</div>

    <div id="sun"></div>
    <div id="sky"></div>

    <script>
        let seenBirds = new Set();
        const sky = document.getElementById('sky');
        const kfStyle = document.getElementById('dynamic-keyframes');
        const countLabel = document.getElementById('bird-count');

        function removeWhiteBackground(img) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < d.data.length; i += 4) {
                    if (d.data[i] > 235 && d.data[i + 1] > 235 && d.data[i + 2] > 235) {
                        d.data[i + 3] = 0;
                    }
                }
                ctx.putImageData(d, 0, 0);
                img.src = canvas.toDataURL('image/png');
            } catch (e) { console.warn('Image processing failed:', e); }
        }

        async function fetchManifest() {
            try {
                const res = await fetch('manifest.json?t=' + Date.now());
                if (!res.ok) return;
                const birds = await res.json();
                birds.forEach(bird => {
                    if (!seenBirds.has(bird.id)) {
                        seenBirds.add(bird.id);
                        addBirdToSky(bird);
                    }
                });
                countLabel.textContent = seenBirds.size + ' bird' + (seenBirds.size !== 1 ? 's' : '') + ' flying';
            } catch (e) { console.warn('Manifest fetch error:', e); }
        }

        function addBirdToSky(bird) {
            kfStyle.innerHTML += '\n' + bird.animation.css_keyframes;

            const wrapper = document.createElement('div');
            wrapper.className = 'bird-wrapper';
            wrapper.id = bird.id;
            wrapper.style.top = (Math.random() * 65 + 8) + 'vh';
            wrapper.style.zIndex = Math.floor(Math.random() * 50) + 51;

            const dur = bird.animation.duration || '18s';
            const timing = bird.animation.timing_function || 'ease-in-out';
            wrapper.style.animation = bird.animation.animation_name + ' ' + dur + ' ' + timing + ' infinite';

            const img = document.createElement('img');
            img.crossOrigin = 'anonymous';
            img.src = bird.image;
            img.className = 'bird';
            img.onload = function () { removeWhiteBackground(img); };
            wrapper.appendChild(img);

            if (bird.bird_name || bird.origin) {
                const label = document.createElement('div');
                label.className = 'bird-label';
                const n = bird.bird_name || 'Anon';
                const o = bird.origin || '';
                if (o) {
                    label.innerHTML = n + ' <span class="origin">· ' + o + '</span>';
                } else {
                    label.textContent = n;
                }
                wrapper.appendChild(label);
            }

            sky.appendChild(wrapper);
        }

        setInterval(fetchManifest, 6000);
        fetchManifest();
    </script>
</body>

</html>
