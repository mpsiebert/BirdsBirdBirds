<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds Birds Birds - Live Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mlh-navy:   #0B1D30;
            --mlh-red:    #E73427;
            --mlh-blue:   #1D539F;
            --mlh-yellow: #F0C142;
            --mlh-white:  #FFFFFF;
            --mlh-gray:   #303030;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            image-rendering: pixelated;
            background: var(--mlh-navy);
        }

        /* Light neutral sky so birds are visible */
        #sky-bg {
            position: absolute; inset: 0;
            background: linear-gradient(180deg,
                #d4e8f7 0%,
                #e8f2fc 25%,
                #f0f6fd 50%,
                #f8fbff 70%,
                #eff4f9 100%
            );
        }

        /* Pixel clouds in MLH white/light blue */
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.7);
            border-bottom: 4px solid rgba(29,83,159,0.08);
            animation: drift 80s linear infinite;
        }
        @keyframes drift {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-60vw); }
        }

        /* Scrolling pixel ground in MLH navy */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: repeating-linear-gradient(90deg,
                var(--mlh-navy) 0px, var(--mlh-navy) 40px,
                #122a42 40px, #122a42 80px
            );
            border-top: 4px solid var(--mlh-red);
            z-index: 100;
            animation: scroll-ground 8s linear infinite;
        }
        @keyframes scroll-ground {
            0%   { background-position: 0 0; }
            100% { background-position: -80px 0; }
        }

        /* HUD - MLH branded */
        #hud {
            position: fixed;
            top: 16px;
            left: 20px;
            z-index: 999;
            color: var(--mlh-navy);
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            font-size: 13px;
            line-height: 2;
        }
        #hud .accent {
            color: var(--mlh-red);
        }

        /* Bird counter in MLH red */
        #bird-count {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 999;
            font-size: 10px;
            color: var(--mlh-white);
            background: var(--mlh-red);
            padding: 8px 14px;
            border: 3px solid var(--mlh-navy);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        /* Credits */
        #credits {
            position: fixed;
            bottom: 74px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            font-size: 6px;
            color: var(--mlh-navy);
            opacity: 0.35;
            white-space: nowrap;
        }

        /* Subtle scanlines */
        #scanlines {
            position: fixed; inset: 0;
            z-index: 998;
            pointer-events: none;
            background: repeating-linear-gradient(
                transparent 0px, transparent 3px,
                rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 6px
            );
        }

        /* Birds */
        .bird-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            will-change: transform;
        }

        .bird {
            max-width: 180px;
            max-height: 180px;
            display: block;
            image-rendering: pixelated;
            animation: flap 0.4s ease-in-out infinite alternate;
        }

        @keyframes flap {
            0%   { transform: scaleY(1) scaleX(1) rotate(0deg); }
            100% { transform: scaleY(0.92) scaleX(1.06) rotate(1.5deg); }
        }

        /* Bird labels - MLH navy + yellow accent */
        .bird-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: var(--mlh-yellow);
            background: var(--mlh-navy);
            border: 2px solid var(--mlh-blue);
            padding: 4px 8px;
            white-space: nowrap;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }

        #sky { position: absolute; inset: 0; z-index: 50; }
    </style>
    <style id="dynamic-keyframes"></style>
</head>
<body>

    <div id="sky-bg"></div>
    <div id="scanlines"></div>

    <div id="hud">
        <span class="accent">WHO'S FLYING TO THE</span><br>
        MLH AI ROADSHOW?
    </div>

    <div id="bird-count">BIRDS: 0</div>
    <div id="credits">MADE WITH LOVE BY THE MLH AI ROADSHOW TEAM</div>

    <div id="sky"></div>
    <div id="ground"></div>

    <script>
        // Generate pixel clouds
        (function() {
            const bg = document.getElementById('sky-bg');
            for (let i = 0; i < 8; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.width  = (80 + Math.random() * 150) + 'px';
                c.style.height = (20 + Math.random() * 28) + 'px';
                c.style.left   = Math.random() * 120 + 'vw';
                c.style.top    = (5 + Math.random() * 50) + 'vh';
                c.style.opacity = 0.4 + Math.random() * 0.3;
                c.style.animationDelay = (-Math.random() * 60) + 's';
                c.style.animationDuration = (50 + Math.random() * 50) + 's';
                bg.appendChild(c);
            }
        })();

        let seenBirds = new Set();
        const sky        = document.getElementById('sky');
        const kfStyle    = document.getElementById('dynamic-keyframes');
        const countLabel = document.getElementById('bird-count');

        function removeWhiteBackground(img) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < d.data.length; i += 4) {
                    if (d.data[i] > 235 && d.data[i+1] > 235 && d.data[i+2] > 235) {
                        d.data[i+3] = 0;
                    }
                }
                ctx.putImageData(d, 0, 0);
                img.src = canvas.toDataURL('image/png');
            } catch(e) { console.warn('Image processing failed:', e); }
        }

        async function fetchManifest() {
            try {
                const res = await fetch('manifest.json?t=' + Date.now());
                if (!res.ok) return;
                const birds = await res.json();
                birds.forEach(bird => {
                    if (!seenBirds.has(bird.id)) {
                        seenBirds.add(bird.id);
                        addBirdToSky(bird);
                    }
                });
                countLabel.textContent = 'BIRDS: ' + seenBirds.size;
            } catch (e) { console.warn('Manifest fetch error:', e); }
        }

        function addBirdToSky(bird) {
            kfStyle.innerHTML += '\n' + bird.animation.css_keyframes;

            const wrapper = document.createElement('div');
            wrapper.className = 'bird-wrapper';
            wrapper.id        = bird.id;
            wrapper.style.top = (Math.random() * 55 + 5) + 'vh';
            wrapper.style.zIndex = Math.floor(Math.random() * 50) + 51;

            const dur    = bird.animation.duration  || '18s';
            const timing = bird.animation.timing_function || 'ease-in-out';
            wrapper.style.animation = bird.animation.animation_name + ' ' + dur + ' ' + timing + ' infinite';

            const img = document.createElement('img');
            img.crossOrigin = 'anonymous';
            img.src       = bird.image;
            img.className = 'bird';
            img.onload = function() { removeWhiteBackground(img); };
            wrapper.appendChild(img);

            if (bird.bird_name || bird.origin) {
                const label = document.createElement('div');
                label.className = 'bird-label';
                const n = (bird.bird_name || 'ANON').toUpperCase();
                const o = (bird.origin || '').toUpperCase();
                label.textContent = o ? n + ' // ' + o : n;
                wrapper.appendChild(label);
            }

            sky.appendChild(wrapper);
        }

        setInterval(fetchManifest, 6000);
        fetchManifest();
    </script>
</body>
</html>
